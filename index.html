<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang cá nhân</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        .banner {
            position: relative;
            text-align: center;
        }

        .banner img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .banner h1 {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 28px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            font-weight: bold;
            color: blue;
        }

        .content {
            display: flex;
            padding: 20px;
        }

        .content img {
            width: 150px;
            border-radius: 10px;
            margin-right: 20px;
        }

        .info {
            font-size: 16px;
        }

        .footer {
            background: #00cfd1;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Banner -->
    <div class="banner">
        <img src="https://via.placeholder.com/800x250" alt="Trường">
        <h1>CHÀO MỪNG ĐẾN VỚI TRANG WEB CÁ NHÂN</h1>
    </div>

    <!-- Menu -->
    <div class="menu">
        <div>Chia sẻ</div>
        <div>Học hỏi</div>
        <div>Sáng tạo</div>
    </div>

    <!-- Nội dung -->
    <div class="content">
        <img src="https://via.placeholder.com/150" alt="Ảnh đại diện">
        <div class="info">
            <p>- Tên:Lê Thị Thủy Tiên</p>
            <p>- Ngày sinh: 17/01/2008</p>
            <p>- Giới tính: Nữ</p>
            <p>- Sở thích: Đi du lịch</p>
        </div>
    </div>
   <!-- Footer -->
    <div class="footer">
        <p>© Copyright 2026.Lê Thị Thủy Tiên</p>
        <p>Số điện thoại: 0879586938</p>
        <p>Liên hệ: thuy98917@gmail.com</p>
    </div>

</body>
</html>
